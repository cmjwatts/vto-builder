<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>V/TO™ Builder — Ninety Professional Services</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="description" content="Draft your EOS Vision/Traction Organizer at your own pace. Built by Ninety." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
  /* ============================================================
     Design tokens — Ninety marketing palette, clean variant
     ============================================================ */
  :root {
    --color-brand-black: #262626;
    --color-brand-blue:  #2F8BAA;
    --color-brand-blue-heavy: #267894;
    --color-brand-grey:  #58595B;
    --color-brand-slate: #BFC4CE;
    --color-brand-stone: #DDDFE7;
    --color-brand-mist:  #F3F3F4;
    --color-brand-ice:   #F7F8FB;
    --color-white:       #FFFFFF;
    --color-brand-blue-15: rgba(47, 139, 170, 0.15);
    --color-brand-blue-08: rgba(47, 139, 170, 0.08);
    --color-brand-blue-04: rgba(47, 139, 170, 0.04);
    --color-text-muted:  #6A6A6A;
    --color-error:       #B23A3A;

    --fg-1: var(--color-brand-black);
    --fg-2: var(--color-brand-grey);
    --fg-3: var(--color-text-muted);
    --fg-on-dark: var(--color-white);
    --fg-link: var(--color-brand-blue);

    --bg-page: var(--color-brand-ice);
    --bg-alt:  var(--color-white);
    --bg-card: var(--color-white);
    --bg-dark: var(--color-brand-black);

    --border-subtle: var(--color-brand-stone);
    --border-strong: var(--color-brand-slate);

    --font-body: "Poppins", -apple-system, BlinkMacSystemFont, "Segoe UI",
                 Roboto, "Helvetica Neue", sans-serif;

    --fs-display: 44px;
    --fs-h1: 34px;
    --fs-h2: 26px;
    --fs-h3: 20px;
    --fs-h4: 16px;
    --fs-body-lg: 17px;
    --fs-body: 15px;
    --fs-body-sm: 13.5px;
    --fs-meta: 12px;
    --fs-eyebrow: 11.5px;

    --tracking-eyebrow: 0.14em;

    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --radius-pill: 50px;

    --shadow-xs: 0 1px 2px rgba(38,38,38,0.05);
    --shadow-sm: 0 2px 6px rgba(38,38,38,0.06);
    --shadow-card: 0 4px 14px rgba(38,38,38,0.07);
    --shadow-md: 0 10px 20px rgba(38,38,38,0.10);
    --shadow-lg: 0 20px 40px rgba(38,38,38,0.12);

    --t-fast: 150ms;
    --t-base: 220ms;
    --t-slow: 360ms;
    --ease-out: cubic-bezier(0.22, 1, 0.36, 1);

    --container-max: 1320px;
    --gutter: 28px;
    --rail-w: 280px;
    --coach-w: 340px;
    --header-h: 68px;
  }

  /* ============================================================
     Base
     ============================================================ */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    font-size: var(--fs-body);
    line-height: 1.55;
    color: var(--fg-1);
    background: var(--bg-page);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  img { max-width: 100%; display: block; }
  button { font-family: inherit; }

  h1, h2, h3, h4, h5, h6 {
    font-family: var(--font-body);
    color: var(--fg-1);
    font-weight: 600;
    line-height: 1.2;
    margin: 0 0 0.4em;
    letter-spacing: -0.01em;
  }
  h1 { font-size: var(--fs-h1); font-weight: 700; letter-spacing: -0.02em; }
  h2 { font-size: var(--fs-h2); }
  h3 { font-size: var(--fs-h3); }
  h4 { font-size: var(--fs-h4); }

  p { margin: 0 0 1em; }
  p:last-child { margin-bottom: 0; }
  a { color: var(--fg-link); text-decoration: none; }
  a:hover { color: var(--color-brand-blue-heavy); }

  .eyebrow {
    display: inline-block;
    text-transform: uppercase;
    letter-spacing: var(--tracking-eyebrow);
    font-size: var(--fs-eyebrow);
    font-weight: 700;
    color: var(--color-brand-blue);
  }
  .eyebrow--muted { color: var(--fg-2); }

  /* ============================================================
     Buttons — HubSpot CTA, Pill, Ghost, Subtle
     ============================================================ */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: var(--radius-md);
    background: var(--color-brand-blue);
    color: var(--color-white);
    font-weight: 500;
    font-size: 15px;
    border: 1.5px solid var(--color-brand-blue);
    cursor: pointer;
    transition: all var(--t-fast) ease;
    text-decoration: none;
    line-height: 1.2;
  }
  .btn:hover { background: var(--color-brand-blue-heavy); border-color: var(--color-brand-blue-heavy); color: var(--color-white); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn--sm { padding: 8px 14px; font-size: 13.5px; }
  .btn--lg { padding: 12px 24px; font-size: 16px; }
  .btn--ghost {
    background: transparent;
    color: var(--color-brand-blue);
    border-color: var(--color-brand-blue);
  }
  .btn--ghost:hover {
    background: var(--color-brand-blue);
    color: var(--color-white);
  }
  .btn--neutral {
    background: var(--color-white);
    color: var(--fg-1);
    border-color: var(--border-subtle);
  }
  .btn--neutral:hover {
    background: var(--color-brand-mist);
    color: var(--fg-1);
    border-color: var(--border-strong);
  }
  .btn--text {
    background: transparent;
    color: var(--fg-2);
    border-color: transparent;
    padding: 8px 12px;
  }
  .btn--text:hover {
    color: var(--fg-1);
    background: var(--color-brand-mist);
  }

  /* ============================================================
     App shell — sticky brand strip + body grid
     ============================================================ */
  .app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .brandstrip {
    background: var(--color-white);
    border-bottom: 1px solid var(--border-subtle);
    position: sticky;
    top: 0;
    z-index: 30;
    height: var(--header-h);
  }
  .brandstrip__inner {
    max-width: var(--container-max);
    margin: 0 auto;
    padding: 0 var(--gutter);
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .brand-mark {
    display: inline-flex;
    flex-direction: column;
    align-items: flex-start;
    line-height: 1.1;
    text-decoration: none;
    color: var(--fg-1);
  }
  .brand-mark__kicker {
    font-weight: 700;
    font-size: 17px;
    color: var(--color-brand-black);
    letter-spacing: -0.01em;
    margin-bottom: 2px;
  }
  .brand-mark__row {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .brand-mark__by {
    font-weight: 500;
    color: var(--fg-2);
    font-size: 12px;
    letter-spacing: 0.02em;
  }
  .brand-mark__logo {
    height: 20px;
    width: auto;
    display: block;
  }

  .brandstrip__actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .brandstrip__status {
    font-size: 12.5px;
    color: var(--fg-3);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .brandstrip__status::before {
    content: "";
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--color-brand-blue);
  }
  @media (max-width: 720px) {
    .brandstrip__status { display: none; }
    .brand-mark__kicker { font-size: 15px; }
  }

  /* ============================================================
     Page body — rail + stage [+ optional coach]
     ============================================================ */
  .page-body {
    max-width: var(--container-max);
    margin: 0 auto;
    padding: 32px var(--gutter) 96px;
    flex: 1;
    width: 100%;
  }
  .page-grid {
    display: grid;
    grid-template-columns: var(--rail-w) 1fr;
    gap: 36px;
    align-items: start;
  }
  body[data-coach-open="true"][data-coach-placement="docked"] .page-grid {
    grid-template-columns: var(--rail-w) 1fr var(--coach-w);
  }
  body[data-nav-style="topbar"] .page-grid {
    grid-template-columns: 1fr;
    gap: 24px;
  }
  body[data-nav-style="topbar"][data-coach-open="true"][data-coach-placement="docked"] .page-grid {
    grid-template-columns: 1fr var(--coach-w);
  }
  body[data-state="welcome"] .page-grid {
    grid-template-columns: 1fr !important;
    max-width: 820px;
    margin: 0 auto;
  }
  @media (max-width: 1080px) {
    .page-grid,
    body[data-coach-open="true"] .page-grid,
    body[data-nav-style="topbar"][data-coach-open="true"] .page-grid {
      grid-template-columns: 1fr;
    }
  }

  .stage {
    min-width: 0;
  }

  /* Card surface used throughout */
  .surface {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-xs);
  }

  /* ============================================================
     Toast
     ============================================================ */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--color-brand-black);
    color: var(--color-white);
    padding: 11px 20px;
    border-radius: var(--radius-md);
    font-size: 14px;
    font-weight: 500;
    box-shadow: var(--shadow-md);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

  /* ============================================================
     Print — landscape doc only
     ============================================================ */
  @media print {
    @page { size: landscape; margin: 0.4in; }
    .brandstrip, .liverail, .vto-coach, .vto-section__nav, .tweaks-panel { display: none !important; }
    body, .page-body { background: white; padding: 0; max-width: none; }
    .page-grid { grid-template-columns: 1fr !important; gap: 0 !important; }
    .surface { border: none; box-shadow: none; }
  }
</style>
</head>
<body data-nav-style="siderail" data-content-treatment="split" data-ai-mode="both" data-flow="progressive" data-coach-open="false" data-state="welcome" data-coach-placement="drawer">

<div class="app">
  <!-- Sticky brand strip -->
  <header class="brandstrip">
    <div class="brandstrip__inner">
      <a class="brand-mark" href="#" aria-label="V/TO Builder, powered by Ninety">
        <span class="brand-mark__kicker">V/TO™ Builder</span>
        <span class="brand-mark__row">
          <span class="brand-mark__by">powered by</span>
          <img class="brand-mark__logo" src="assets/90-logo-black.png" alt="Ninety" />
        </span>
      </a>

      <div class="brandstrip__actions" id="brandstrip-actions">
        <span class="brandstrip__status">Saved in this browser</span>
      </div>
    </div>
  </header>

  <main class="page-body">
    <div class="page-grid" id="stage">
      <noscript><p>This page needs JavaScript.</p></noscript>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<!-- Precompiled bundles (built by `npm run build` → esbuild). vendor must load
     first: it defines the window.React / window.ReactDOM globals app.js uses. -->
<script src="assets/vendor.js"></script>
<script src="assets/app.js"></script>

</body>
</html>
